name: MercariSpy

on:
  schedule:
    - cron: "0 */2 * * *"   # каждые 2 часа
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1. Забираем код
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # 3. Системные зависимости (Selenium / Chrome)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget unzip curl \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libasound2 libpangocairo-1.0-0 libgtk-3-0 \
            libxshmfence1

      # 4. Python зависимости
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Создаём .env из GitHub Secrets
      - name: Create .env file
        run: |
          cat <<EOF > .env
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          EOF

      # 6. (Важно) гарантируем headless режим через env
      - name: Set environment
        run: echo "HEADLESS=true" >> $GITHUB_ENV

      # 7. Запуск бота
      - name: Run MercariSpy
        run: |
          python main.py --once

      # 8. Сохраняем состояние (чтобы не было дублей)
      - name: Commit state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add mercari_known_products.json

          if ! git diff --cached --quiet; then
            git commit -m "update: mercari state"
            git push
          fi
